{% extends "base.html" %}

{% block content %}
    
    <h3>Grocery List</h3>
    
    <ul style="list-style-type: none; padding: 0; max-width: 300px;">
        {% for item in groceries %}
            
            <li style="background-color: white; padding: 8px 12px; margin-bottom: 6px; border-radius: 4px; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
                {{ item.item }}
                <form action="/delete" method="POST" style="display:inline;">
                    <input type="hidden" name="item_id" value="{{ item.id }}">
                    <button type="submit" style="background-color: #ff4d4d; color: white; border: none; padding: 2px 6px; font-size: 12px; border-radius: 3px; cursor: pointer;">X</button>
                </form>
            </li>

        {% endfor %}
    </ul>
    
    <form action="/add" method="POST">
        <input type="text" name="item_name" placeholder="Type an item here..." required>
        <button type="submit">Add to List</button>
    </form>

{% endblock %}
