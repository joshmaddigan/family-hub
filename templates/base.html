<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/groceries">Groceries</a>
        <a href="/chores">Chores</a>
        <a href="/bugs">Bug Tracker</a>
        <a href="/logout" style="margin-left: auto; color: var(--danger);">Logout</a>
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <!-- Persistent Bug Reporter -->
    <div class="card bug-report-footer">
        <h3 style="margin-top: 0; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem;">
            <span>🐞</span> Report a Bug
        </h3>
        <form action="/report_bug" method="POST">
            <input type="text" name="bug_report" placeholder="What broke?" required>
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
